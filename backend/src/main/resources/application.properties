quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=ebpuser
quarkus.datasource.password=ebppass
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/ebpdb

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

quarkus.http.port=8080

# CORS - Quarkus 3.x syntax
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=location,info
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# Jackson - serialize dates as strings not arrays
quarkus.jackson.write-dates-as-timestamps=false

# ============================================
# RAG Configuration
# ============================================
# Vector Store (Milvus)
milvus.host=localhost
milvus.port=19530
milvus.collection.name=employee_patterns
milvus.index.type=IVF_FLAT
milvus.nprobe=10

# Embedding Configuration
embedding.model=text-embedding-3-small
embedding.dimension=1536
embedding.batch.size=32

# OpenAI Configuration
openai.api.key=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
openai.model=gpt-4o-mini
openai.temperature=0.5
openai.max.tokens=200
openai.enabled=true

# RAG Configuration
rag.enabled=true
rag.similarity.threshold=0.5
rag.top.k=3 
rag.cache.enabled=true
rag.cache.ttl.minutes=60

# Performance Tuning
rag.batch.training.size=100
rag.embedding.cache.size=10000
rag.search.timeout.ms=5000
