version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ebp-postgres
    environment:
      POSTGRES_DB: ebpdb
      POSTGRES_USER: ebpuser
      POSTGRES_PASSWORD: ebppass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebpuser -d ebpdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin ─────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ebp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ebp.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ── Milvus: etcd (metadata store) ───────────────────────────────────────────
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD-SHELL", "etcdctl endpoint health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Milvus: MinIO (object storage) ──────────────────────────────────────────
  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Milvus Standalone ────────────────────────────────────────────────────────
  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.3.5
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── Redis (Superset cache + Celery broker) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ebp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Apache Superset ─────────────────────────────────────────────────────────
  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    container_name: ebp-superset
    environment:
      SUPERSET_SECRET_KEY: "ebp-superset-secret-key-change-in-prod"
      SUPERSET_CONFIG_PATH: /app/superset/superset_config.py
      DATABASE_URL: "postgresql+psycopg2://ebpuser:ebppass@ebp-postgres:5432/ebpdb"
      REDIS_URL: "redis://ebp-redis:6379/0"
      PYTHONPATH: /app/superset
    ports:
      - "8088:8088"
    volumes:
      - ./superset:/app/superset
      - superset_home:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  superset_home:
  etcd_data:
  minio_data:
  milvus_data:
